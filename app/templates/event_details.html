{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <h1 class="h5 mb-1">{{ event.title }}</h1>
    <div class="text-muted">
      {{ event.date }} • {{ event.time }} • <span class="badge text-bg-secondary">{{ event.category }}</span>
    </div>
  </div>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('main.edit_event_view', event_id=event.id) }}">Edit</a>
    <form method="post" action="{{ url_for('main.delete_event_view', event_id=event.id) }}" onsubmit="return confirm('Are you sure you want to delete this event?');">
      <button class="btn btn-outline-danger btn-sm">Delete</button>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <h2 class="h6">Description</h2>
    {% if event.description %}
      <p class="mb-0">{{ event.description }}</p>
    {% else %}
      <p class="text-muted mb-0">No description.</p>
    {% endif %}
  </div>
</div>

<div class="mt-3">
  <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('main.day_view', date_str=event.date) }}">Back la zi</a>
</div>
{% endblock %}
