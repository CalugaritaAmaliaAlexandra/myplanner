{% extends "base.html" %}
{% block content %}
<h1 class="h5 mb-3">Edit event</h1>

<form method="post" class="card card-body">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Title</label>
      <input name="title" class="form-control" required minlength="3" value="{{ form.title or '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Date</label>
      <input name="date" type="date" class="form-control" required value="{{ form.date or '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Time</label>
      <input name="time" type="time" class="form-control" required value="{{ form.time or '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Category</label>
      <select name="category" class="form-select" required>
        {% for c in categories %}
          <option value="{{ c }}" {% if form.category==c %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label">Description (optional)</label>
      <textarea name="description" class="form-control" rows="3">{{ form.description or '' }}</textarea>
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-primary">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('main.event_details', event_id=event_id) }}">Back</a>
  </div>
</form>
{% endblock %}
