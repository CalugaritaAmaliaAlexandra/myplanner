<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Calendar background -->
  <rect width="512" height="512" fill="#e8f0f7" rx="60"/>
  
  <!-- Calendar border -->
  <rect x="80" y="100" width="352" height="320" fill="#3b82f6" rx="30" stroke="#1e3a5f" stroke-width="20"/>
  
  <!-- Calendar top bar -->
  <rect x="80" y="100" width="352" height="80" fill="#1e90ff" rx="30"/>
  
  <!-- Rings/holes -->
  <circle cx="150" cy="110" r="25" fill="#d1e7f5" stroke="#1e3a5f" stroke-width="8"/>
  <circle cx="362" cy="110" r="25" fill="#d1e7f5" stroke="#1e3a5f" stroke-width="8"/>
  
  <!-- Event boxes (colored squares) -->
  <!-- Green box -->
  <rect x="140" y="220" width="35" height="35" fill="#34d399" rx="8"/>
  <!-- Yellow box -->
  <rect x="210" y="220" width="35" height="35" fill="#fbbf24" rx="8"/>
  <!-- Blue box -->
  <rect x="280" y="220" width="35" height="35" fill="#60a5fa" rx="8"/>
  <!-- Red box -->
  <rect x="350" y="220" width="35" height="35" fill="#f87171" rx="8"/>
  
  <!-- More event boxes -->
  <rect x="140" y="290" width="35" height="35" fill="#f87171" rx="8"/>
  <rect x="210" y="290" width="35" height="35" fill="#60a5fa" rx="8"/>
  <rect x="280" y="290" width="35" height="35" fill="#f87171" rx="8"/>
  
  <!-- Large checkmark -->
  <g transform="translate(320, 340)">
    <!-- Checkmark -->
    <path d="M -30 0 L -5 25 L 40 -30" fill="none" stroke="#34d399" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Checkmark background circle -->
    <circle cx="10" cy="0" r="55" fill="none" stroke="#34d399" stroke-width="12" opacity="0.3"/>
  </g>
</svg>
